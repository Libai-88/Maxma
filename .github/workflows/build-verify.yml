name: Build Verify

on:
  schedule:
    - cron: "0 3 * * 1"
  workflow_dispatch:

jobs:
  pyinstaller-build:
    runs-on: windows-latest

    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Set up Python 3.13
        uses: actions/setup-python@v5
        with:
          python-version: "3.13"

      - name: Set up Node.js 20
        uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: "npm"
          cache-dependency-path: web/package-lock.json

      - name: Run packaging safety preflight
        shell: powershell
        run: .\build\test-packaging-safety.ps1 -SkipArtifact

      - name: Build server through the clean-checkout entry point
        shell: cmd
        env:
          MAXMA_CI: "1"
        run: call build\build-server.bat

      - name: Verify build contracts and sanitized PyInstaller contents
        shell: powershell
        run: |
          .\build\test-build-contract.ps1
          .\build\test-packaging-safety.ps1 -TocPath "build\maxma-server\PKG-00.toc"

      - name: Verify build artifact
        shell: powershell
        run: |
          if (-not (Test-Path "dist\maxma-server.exe")) {
            Write-Error "Build artifact dist\maxma-server.exe not found"
            exit 1
          }
          Write-Host "Build artifact verified: dist\maxma-server.exe"
