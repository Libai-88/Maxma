[mypy]
python_version = 3.12
warn_return_any = True
warn_unused_configs = True
disallow_untyped_defs = False
check_untyped_defs = True
ignore_missing_imports = True
exclude = (?x)(
    ^tests/
    | ^\.venv/
    | ^web/
    | ^dev_docs/
    | ^setup\.py$
    | ^anthropic_skills/
    )

[mypy-langchain.*]
ignore_missing_imports = True

[mypy-langgraph.*]
ignore_missing_imports = True

[mypy-fastapi.*]
ignore_missing_imports = True

[mypy-pydantic.*]
ignore_missing_imports = True

[mypy-yaml.*]
ignore_missing_imports = True

[mypy-playwright.*]
ignore_missing_imports = True
